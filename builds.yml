# APHELIOS BUILD SYSTEM YML (Season 2026)
# ==========================================

build_paths:
  dps_sustained:
    description: "Maximiza el DPS en peleas largas contra tanques o composiciones de dive lento."
    core:
      - item: "Kraken Slayer"
        priority: 1
        notes: "Sinergia brutal con Severum Q y auto-attacks rápidos."
      - item: "Infinity Edge"
        priority: 2
        notes: "Multiplicador de crítico obligatorio. Escalado late game."
      - item: "Lord Dominik's Regards"
        priority: 3
        notes: "Contra tanques y escalados de armadura altos."
    situational:
      - item: "Bloodthirster"
        notes: "Si necesitas sustain extremo contra composiciones de Poke."
      - item: "Guardian Angel"
        notes: "Contra asesinos de burst alto (Zed, Talon)."

  burst_assassination:
    description: "Para borrar objetivos blandos con Calibrum y combinaciones de Infernum R."
    core:
      - item: "The Collector"
        priority: 1
        notes: "Lethality para castigar el early/mid game y asegurar kills."
      - item: "Essence Reaver"
        priority: 2
        notes: "Spellblade para spamear habilidades y daño de burst."
      - item: "Yun Tal Wildarrows"
        priority: 3
        notes: "Daño de sangrado por crítico."
    situational:
      - item: "Maw of Malmortius"
        notes: "Si el AP enemigo tiene mucho burst (LeBlanc, Syndra)."
      - item: "Edge of Night"
        notes: "Spell shield para evitar iniciaciones clave."

  hyper_carry_critical:
    description: "El build clásico de 100% crítico para destruir en el minuto 30."
    core:
      - item: "Statikk Shiv"
        priority: 1
        notes: "Clear wave y daño mágico en área."
      - item: "Infinity Edge"
        priority: 2
        notes: "Núcleo de daño."
      - item: "Phantom Dancer"
        priority: 3
        notes: "Velocidad de movimiento y Attack Speed extremo para Crescendum."

runes:
  main_tree: "Precision"
  key_stone: "Lethal Tempo"
  notes: "Lethal Tempo reduce el tiempo de retorno de los proyectiles de Crescendum, lo que permite un DPS exponencial en corto rango."
  minor_runes:
    - "Presence of Mind"
    - "Legend: Bloodline"
    - "Cut Down"
  sub_tree: "Domination"
  sub_runes:
    - "Eyeball Collection"
    - "Treasure Hunter"

skill_order:
  max_sequence: ["Q", "W", "E"]
  stat_priority: ["Attack Damage", "Attack Speed", "Lethality"]
  notes: "Maximizar AD primero para escalado de habilidades, luego AS para multiplicar el DPS."
